<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Dark metallic background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="#111113"/>

  <!-- Ring width: 130, gap: 10 -->
  <!-- Outer: r=390, Middle: r=250, Inner: r=110 -->

  <!-- Outer ring track -->
  <circle cx="512" cy="512" r="390" fill="none" stroke="#DA7756" stroke-opacity="0.2" stroke-width="130"/>
  <!-- Outer ring fill: 69% -->
  <path d="M 512 122 A 390 390 0 1 1 149.39 655.57" fill="none" stroke="#DA7756" stroke-width="130" stroke-linecap="round"/>

  <!-- Middle ring track -->
  <circle cx="512" cy="512" r="250" fill="none" stroke="#DA7756" stroke-opacity="0.2" stroke-width="130"/>
  <!-- Middle ring fill: 33% -->
  <path d="M 512 262 A 250 250 0 0 1 731.08 632.44" fill="none" stroke="#DA7756" stroke-width="130" stroke-linecap="round"/>

  <!-- Inner ring track -->
  <circle cx="512" cy="512" r="110" fill="none" stroke="#DA7756" stroke-opacity="0.2" stroke-width="130"/>
  <!-- Inner ring fill: 42% -->
  <path d="M 512 402 A 110 110 0 0 1 564.99 608.39" fill="none" stroke="#DA7756" stroke-width="130" stroke-linecap="round"/>
</svg>
