<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Dark metallic background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="#111113"/>

  <!-- Ring width: 100, gap: 12 -->
  <!-- Outer: r=402, Middle: r=290, Inner: r=178 -->

  <!-- Outer ring track -->
  <circle cx="512" cy="512" r="402" fill="none" stroke="#DA7756" stroke-opacity="0.2" stroke-width="100"/>
  <!-- Outer ring fill: 69% -->
  <path d="M 512 110 A 402 402 0 1 1 138.23 659.99" fill="none" stroke="#DA7756" stroke-width="100" stroke-linecap="round"/>

  <!-- Middle ring track -->
  <circle cx="512" cy="512" r="290" fill="none" stroke="#DA7756" stroke-opacity="0.2" stroke-width="100"/>
  <!-- Middle ring fill: 33% -->
  <path d="M 512 222 A 290 290 0 0 1 766.13 651.71" fill="none" stroke="#DA7756" stroke-width="100" stroke-linecap="round"/>

  <!-- Inner ring track -->
  <circle cx="512" cy="512" r="178" fill="none" stroke="#DA7756" stroke-opacity="0.2" stroke-width="100"/>
  <!-- Inner ring fill: 42% -->
  <path d="M 512 334 A 178 178 0 0 1 597.75 667.98" fill="none" stroke="#DA7756" stroke-width="100" stroke-linecap="round"/>
</svg>
