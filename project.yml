name: Claude Your Rings
options:
  bundleIdPrefix: com.ranveer
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.3"
  defaultConfig: Debug

settings:
  base:
    DEVELOPMENT_TEAM: 29F59849NR
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    ENABLE_PREVIEWS: "YES"
    SWIFT_APPROACHABLE_CONCURRENCY: "YES"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"

schemes:
  Claude Your Rings:
    build:
      targets:
        Claude Your Rings: all

  Claude Your Rings iOS:
    build:
      targets:
        Claude Your Rings iOS: all
        Claude Your Rings Widget: all

  Claude Your Rings Watch:
    build:
      targets:
        Claude Your Rings Watch: all

targets:

  # ── macOS Menu Bar App ──────────────────────────────────────
  Claude Your Rings:
    type: application
    platform: macOS
    sources:
      - path: macOS
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ranveer.ClaudeYourRings
        INFOPLIST_FILE: macOS/Info.plist
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ENABLE_APP_SANDBOX: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        CODE_SIGN_ENTITLEMENTS: macOS/Claude_Usage.entitlements

  # ── iOS / iPadOS App ────────────────────────────────────────
  Claude Your Rings iOS:
    type: application
    platform: iOS
    sources:
      - path: iOS
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ranveer.ClaudeYourRings
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: iOS/Claude_Usage_iOS.entitlements
    dependencies:
      - target: Claude Your Rings Widget

  # ── WidgetKit Extension ─────────────────────────────────────
  Claude Your Rings Widget:
    type: app-extension
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ranveer.ClaudeYourRings.widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/Claude_Usage_Widget.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    sources:
      - path: Widget
        excludes:
          - "**/.DS_Store"
      - path: Shared/UsageData.swift
      - path: Shared/SharedDefaults.swift
      - path: Shared/ConcentricCirclesView.swift
      - path: Shared/UsageViews.swift

  # ── watchOS App ─────────────────────────────────────────────
  Claude Your Rings Watch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
        excludes:
          - "**/.DS_Store"
      - path: Shared/UsageData.swift
      - path: Shared/SharedDefaults.swift
      - path: Shared/ConcentricCirclesView.swift
      - path: Shared/UsageViews.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ranveer.ClaudeYourRings.watchkitapp
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.ranveer.ClaudeYourRings
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Watch/Claude_Usage_Watch.entitlements
